databases:
  - name: revrecog-db
    plan: free
    databaseName: revrecog
    user: finmarkadmin

services:
  - type: web
    name: revrecog-ai
    plan: free
    runtime: python
    buildCommand: |
      cd backend && pip install -r requirements.txt
      cd ../frontend && npm install && npm run build
    startCommand: cd backend && gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: revrecog-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
    rootDir: .
